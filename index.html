    /* ═══════════════════════════════════════════
       NEWS SOURCE TIER
    ═══════════════════════════════════════════ */
    const SOURCE_T1 = new Set(["coindesk","cointelegraph","theblock","the_block","decrypt","bloomberg","reuters","cnbc","blockworks"]);
    const SOURCE_T2 = new Set(["bitcoinmagazine","dailyhodl","cryptoslate","ambcrypto","beincrypto","cryptopotato","unchainedcrypto","thedefiant"]);
    function srcTier(s) {
      const k = (s||"").toLowerCase().replace(/[\s.\-]/g,"");
      if (SOURCE_T1.has(k)) return 1;
      if (SOURCE_T2.has(k)) return 2;
      return 3;
    }
    const TIER_COLOR = { 1: "#00e5ff", 2: "#8b5cf6", 3: "#555" };

    /* ═══════════════════════════════════════════
       UTILS
    ═══════════════════════════════════════════ */
    const sleep = ms => new Promise(r => setTimeout(r, ms));

    function fmtDate(ts) {
      return new Date(Number(ts)).toLocaleString("zh-CN", {
        year:"numeric",month:"2-digit",day:"2-digit",
        hour:"2-digit",minute:"2-digit",second:"2-digit",
        hour12:false, timeZone:"Asia/Shanghai",
      });
    }
    function fmtShort(ts) {
      return new Date(Number(ts)).toLocaleString("zh-CN", {
        month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",
        hour12:false, timeZone:"Asia/Shanghai",
      });
    }
    function dateStr(ts, off=0) {
      return new Date(Number(ts)+off*864e5).toISOString().slice(0,10);
    }
    function timeSince(ts) {
      const d = Date.now()-Number(ts), m=Math.floor(d/6e4);
      if(m<60) return m+" 分钟前";
      const h=Math.floor(m/60); if(h<24) return h+" 小时前";
      const dy=Math.floor(h/24); if(dy<30) return dy+" 天前";
      const mo=Math.floor(dy/30); if(mo<12) return mo+" 个月前";
      return Math.floor(mo/12)+" 年前";
    }

    /* ═══════════════════════════════════════════
       FETCH NEWS (CryptoCompare)
    ═══════════════════════════════════════════ */
    async function fetchNews(coin, hitTs) {
      const hitSec = Math.floor(Number(hitTs)/1000);
      const lo = hitSec - 2*86400, hi = hitSec + 86400;
      const all = []; let lTs = hi;
      for (let p=0; p<5; p++) {
        try {
          const r = await fetch(`https://min-api.cryptocompare.com/data/v2/news/?lang=EN&categories=${coin}&lTs=${lTs}&extraParams=OKXTimeMachine`);
          if(!r.ok) break;
          const j = await r.json();
          if(!j.Data||!j.Data.length) break;
          for (const a of j.Data) {
            if(a.published_on>=lo && a.published_on<=hi) all.push(a);
            if(a.published_on<lo) return dedup(all);
          }
          lTs = j.Data[j.Data.length-1].published_on;
          await sleep(200);
        } catch(e) { break; }
      }
      return dedup(all);
    }
    function dedup(a) { const s=new Set(); return a.filter(x=>{ if(s.has(x.id))return false; s.add(x.id); return true; }); }

    /* ═══════════════════════════════════════════
       CHART COMPONENT (TradingView Lightweight)
    ═══════════════════════════════════════════ */
    function PriceChart({ candles, hitTs, hitPrice, pair, events, enabledCats }) {
      const containerRef = useRef(null);
      const chartRef = useRef(null);
      const [tooltip, setTooltip] = useState(null);

      useEffect(() => {
        if (!containerRef.current || !candles.length) return;
        // clear
        containerRef.current.innerHTML = "";
        const chart = LightweightCharts.createChart(containerRef.current, {
          width: containerRef.current.clientWidth,
          height: 400,
          layout: { background: { color: "#0d0d1a" }, textColor: "#888", fontSize: 12 },
          grid: { vertLines: { color: "#1a1a2e" }, horzLines: { color: "#1a1a2e" } },
          crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
          rightPriceScale: { borderColor: "#2a2a40" },
          timeScale: { borderColor: "#2a2a40", timeVisible: true, secondsVisible: false },
        });
        chartRef.current = chart;

        const series = chart.addCandlestickSeries({
          upColor: "#26a69a", downColor: "#ef5350",
          borderUpColor: "#26a69a", borderDownColor: "#ef5350",
          wickUpColor: "#26a69a", wickDownColor: "#ef5350",
        });

        const data = candles.map(c => ({
          time: Math.floor(Number(c[0])/1000),
          open: Number(c[1]), high: Number(c[2]),
          low: Number(c[3]), close: Number(c[4]),
        })).sort((a,b)=>a.time-b.time);

        series.setData(data);

        // Hit price line
        if (hitPrice) {
          series.createPriceLine({
            price: Number(hitPrice),
            color: "#00e5ff",
            lineWidth: 1,
            lineStyle: LightweightCharts.LineStyle.Dashed,
            axisLabelVisible: true,
            title: "目标价 $" + Number(hitPrice).toLocaleString(),
          });
        }

        // Event markers
        const markers = [];
        const hitSec = Math.floor(Number(hitTs)/1000);
        const minT = data[0]?.time || 0;
        const maxT = data[data.length-1]?.time || Infinity;

        events.forEach(ev => {
          if (!enabledCats.has(ev.cat)) return;
          const evSec = Math.floor(new Date(ev.date+"T00:00:00Z").getTime()/1000);
          if (evSec >= minT && evSec <= maxT) {
            // snap to nearest candle
            let closest = data[0];
            let minDiff = Infinity;
            for (const d of data) {
              const diff = Math.abs(d.time - evSec);
              if (diff < minDiff) { minDiff = diff; closest = d; }
            }
            const cfg = CAT_CONFIG[ev.cat];
            markers.push({
              time: closest.time,
              position: "aboveBar",
              color: cfg.color,
              shape: "circle",
              text: cfg.icon + " " + ev.title.slice(0, 12),
              id: ev.date + ev.cat,
            });
          }
        });
        markers.sort((a,b)=>a.time-b.time);
        series.setMarkers(markers);

        // hit time marker
        const hitMarker = {
          time: hitSec,
          position: "belowBar",
          color: "#00e5ff",
          shape: "arrowUp",
          text: "⏱ 触及目标价",
        };
        const allMarkers = [...markers, hitMarker].sort((a,b)=>a.time-b.time);
        series.setMarkers(allMarkers);

        // auto-fit
        chart.timeScale().fitContent();

        // resize
        const ro = new ResizeObserver(() => {
          if(containerRef.current) chart.applyOptions({ width: containerRef.current.clientWidth });
        });
        ro.observe(containerRef.current);

        return () => { chart.remove(); ro.disconnect(); };
      }, [candles, hitTs, hitPrice, events, enabledCats]);

      return <div ref={containerRef} style={{ width:"100%", borderRadius:12, overflow:"hidden" }} />;
    }

    /* ═══════════════════════════════════════════
       EVENT TIMELINE COMPONENT
    ═══════════════════════════════════════════ */
    function EventTimeline({ events, hitTs, enabledCats }) {
      const hitDate = dateStr(hitTs);
      // show events within ±30 days of hit
      const lo = new Date(Number(hitTs) - 30*864e5).toISOString().slice(0,10);
      const hi = new Date(Number(hitTs) + 30*864e5).toISOString().slice(0,10);

      const nearby = events
        .filter(e => e.date >= lo && e.date <= hi && enabledCats.has(e.cat))
        .sort((a,b) => a.date.localeCompare(b.date));

      if (!nearby.length) return null;

      return (
        <div style={{ marginTop: 16 }}>
          <h3 style={{ fontSize: 14, fontWeight: 700, color: "#fff", marginBottom: 12 }}>
            📅 事件时间轴（触及日 ±30天）
          </h3>
          <div style={{ position: "relative", paddingLeft: 20 }}>
            <div style={{ position:"absolute", left:7, top:0, bottom:0, width:2, background:"#1e1e35" }} />
            {nearby.map((ev,i) => {
              const cfg = CAT_CONFIG[ev.cat];
              const isHitDay = ev.date === hitDate;
              return (
                <div key={ev.date+ev.cat+i} className="fade-in" style={{
                  position:"relative", marginBottom:12, paddingLeft:18,
                  animationDelay: `${i*40}ms`,
                }}>
                  <div style={{
                    position:"absolute", left:-2, top:6, width:14, height:14,
                    borderRadius:"50%", background: cfg.color,
                    border: isHitDay ? "2px solid #fff" : "2px solid #0d0d1a",
                    zIndex:1,
                  }} />
                  <div style={{
                    background: isHitDay ? "rgba(0,229,255,0.08)" : "rgba(255,255,255,0.02)",
                    border: `1px solid ${isHitDay ? "rgba(0,229,255,0.2)" : "rgba(255,255,255,0.05)"}`,
                    borderRadius: 10, padding: "10px 14px",
                  }}>
                    <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:4 }}>
                      <span style={{ fontSize:11, color:"#666" }}>{ev.date}</span>
                      <span style={{
                        fontSize:9, fontWeight:800, padding:"1px 7px", borderRadius:4,
                        background: cfg.color+"22", color: cfg.color, border:`1px solid ${cfg.color}44`,
                      }}>{cfg.icon} {cfg.label}</span>
                    </div>
                    <div style={{ fontSize:13, fontWeight:700, color:"#eee", marginBottom:2 }}>
                      {ev.title}
                    </div>
                    <div style={{ fontSize:12, color:"#888", lineHeight:1.5 }}>{ev.desc}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════
       NEWS CARD COMPONENT
    ═══════════════════════════════════════════ */
    function NewsCard({ article, index }) {
      const tier = srcTier(article.source_info?.name || article.source);
      const labels = { 1:"T1", 2:"T2", 3:"T3" };
      return (
        <a href={article.url} target="_blank" rel="noopener noreferrer"
          className="fade-in" style={{
            display:"block", background:"rgba(255,255,255,0.02)",
            border:`1px solid ${tier===1?"rgba(0,229,255,0.12)":"rgba(255,255,255,0.05)"}`,
            borderRadius:10, padding:"14px 16px", marginBottom:8,
            transition:"all 0.15s", animationDelay:`${index*40}ms`,
          }}
          onMouseOver={e=>{e.currentTarget.style.background="rgba(255,255,255,0.05)";e.currentTarget.style.borderColor="rgba(0,229,255,0.25)"}}
          onMouseOut={e=>{e.currentTarget.style.background="rgba(255,255,255,0.02)";e.currentTarget.style.borderColor=tier===1?"rgba(0,229,255,0.12)":"rgba(255,255,255,0.05)"}}
        >
          <div style={{ display:"flex", justifyContent:"space-between", gap:10, marginBottom:6 }}>
            <div style={{ fontSize:13, fontWeight:700, color:"#fff", lineHeight:1.5, flex:1 }}>{article.title}</div>
            <span style={{
              flexShrink:0, fontSize:9, fontWeight:800, padding:"2px 7px", borderRadius:5,
              background:`${TIER_COLOR[tier]}22`, color:TIER_COLOR[tier], border:`1px solid ${TIER_COLOR[tier]}44`,
            }}>{labels[tier]}</span>
          </div>
          <div style={{ fontSize:11, color:"#888", lineHeight:1.5, marginBottom:8,
            display:"-webkit-box", WebkitLineClamp:2, WebkitBoxOrient:"vertical", overflow:"hidden" }}>
            {article.body}
          </div>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <div style={{ display:"flex", alignItems:"center", gap:6 }}>
              {article.source_info?.img && <img src={article.source_info.img} alt="" style={{ width:14, height:14, borderRadius:3 }} onError={e=>e.target.style.display="none"} />}
              <span style={{ fontSize:11, color:TIER_COLOR[tier], fontWeight:600 }}>{article.source_info?.name||article.source}</span>
            </div>
            <span style={{ fontSize:10, color:"#555" }}>{fmtShort(article.published_on*1000)}</span>
          </div>
        </a>
      );
    }

    ═══════════════════════════════════════════ */

      const [news, setNews] = useState([]);
      const [newsLoading, setNewsLoading] = useState(false);
      const [newsFilter, setNewsFilter] = useState("all");
      const [enabledCats, setEnabledCats] = useState(new Set(Object.keys(CAT_CONFIG)));
      const [activeTab, setActiveTab] = useState("chart"); // chart | timeline | news
      const abortRef = useRef(null);
      const coinName = pair.split("-")[0];

      const toggleCat = (cat) => {
        setEnabledCats(prev => {
          const next = new Set(prev);
          next.has(cat) ? next.delete(cat) : next.add(cat);
          return next;
        });
      };

      /* ── Search Logic ── */
      const search = useCallback(async () => {
        if (!price || isNaN(Number(price))) { setError("请输入有效价格"); return; }
        setLoading(true); setError(null); setResult(null); setChartCandles([]);
        setNews([]); setProgress("正在查询历史K线数据..."); setBatchCount(0);

        const target = Number(price);
        let found = null, after = "", attempts = 0;
        const controller = new AbortController();
        abortRef.current = controller;
        const allCandles = [];

        try {
          while (attempts < 80 && !found) {
            attempts++; setBatchCount(attempts);
            setProgress(`正在扫描第 ${attempts} 批K线数据...`);
            let url = `https://www.okx.com/api/v5/market/history-candles?instId=${pair}&bar=${bar}&limit=100`;
            if (after) url += `&after=${after}`;

            let resp, retries = 0;
            while (retries <= 3) {
              resp = await fetch(url, { signal: controller.signal });
              if (resp.status === 429) {
                retries++;
                if (retries > 3) throw new Error("OKX API 频率限制，已重试3次。请稍后再试。");
                setProgress(`频率限制，等待 ${retries*2}s...`);
                await sleep(retries * 2000);
              } else break;
            }
            if (!resp.ok) throw new Error(`API 错误: ${resp.status}`);
            const json = await resp.json();
            if (json.code !== "0") throw new Error(`OKX: ${json.msg}`);
            const candles = json.data;
            if (!candles?.length) break;

            allCandles.push(...candles);
            for (const c of candles) {
              if (target >= Number(c[3]) && target <= Number(c[2])) { found = { ts:c[0],open:c[1],high:c[2],low:c[3],close:c[4],vol:c[5] }; break; }
            }
            if (!found) { after = candles[candles.length-1][0]; await sleep(350); }
          }

          if (found) {
            setResult(found);
            // Load more candles around the hit for chart context
            setProgress("正在加载图表数据...");
            let chartData = [...allCandles];
            // Load some candles AFTER the hit time for context
            try {
              const beforeUrl = `https://www.okx.com/api/v5/market/candles?instId=${pair}&bar=${bar}&limit=100&before=${found.ts}`;
              const br = await fetch(beforeUrl, { signal: controller.signal });
              if (br.ok) {
                const bj = await br.json();
                if (bj.code === "0" && bj.data) chartData = [...bj.data, ...chartData];
              }
            } catch(e) {}
            setChartCandles(chartData);

            // Fetch news
            setNewsLoading(true);
            setProgress("正在获取当时的市场新闻...");
            try {
              const articles = await fetchNews(coinName, found.ts);
              setNews(articles);
            } catch(e) {}
            setNewsLoading(false);
          } else {
            setError(`未找到价格 $${target.toLocaleString()} 的记录（已扫描 ${attempts*100} 根K线）`);
          }
        } catch(e) {
          if (e.name !== "AbortError") {
            setError(e.message.includes("fetch") ? "网络错误（可能是 CORS 限制）" : e.message);
          }
        }
        setLoading(false); setProgress("");
      }, [pair, price, bar, coinName]);

      const cancel = () => { abortRef.current?.abort(); setLoading(false); setProgress(""); };

      /* ── Derived ── */
      const filteredNews = news.filter(a => {
        if(newsFilter==="all") return true;
        if(newsFilter==="t1") return srcTier(a.source_info?.name||a.source)===1;
        return srcTier(a.source_info?.name||a.source)<=2;
      });
      const t1Count = news.filter(a=>srcTier(a.source_info?.name||a.source)===1).length;
      const newsDateRange = result ? { from: dateStr(result.ts,-3), to: dateStr(result.ts,3) } : null;

      return (
        <div style={{ padding:"20px 16px", maxWidth:900, margin:"0 auto" }}>
          {/* Header */}
          <div style={{ textAlign:"center", marginBottom:28, paddingTop:12 }}>
            <h1 style={{ fontSize:24, fontWeight:800, color:"#00e5ff", letterSpacing:1.5, marginBottom:4 }}>
              ⏱️ OKX Price Time Machine
            </h1>
            <p style={{ color:"#555", fontSize:12 }}>
              查找最后触及目标价的时间 · K线图表 · 重大事件标注 · 实时新闻回溯
            </p>
          </div>

          {/* Control Panel */}
          <div style={{
            background:"rgba(255,255,255,0.02)", borderRadius:14,
            padding:"20px 18px", border:"1px solid rgba(255,255,255,0.05)", marginBottom:20,
          }}>
            <div style={{ display:"flex", gap:10, marginBottom:14, flexWrap:"wrap" }}>
              <div style={{ flex:"1 1 180px" }}>
                <label style={{ fontSize:10, color:"#555", textTransform:"uppercase", letterSpacing:1, marginBottom:5, display:"block" }}>交易对</label>
                <select value={pair} onChange={e=>setPair(e.target.value)} style={{
                  width:"100%", padding:"10px 12px", background:"#12121f",
                  border:"1px solid rgba(255,255,255,0.08)", borderRadius:8,
                  color:"#fff", fontSize:14, fontWeight:600, cursor:"pointer", outline:"none",
                }}>
                  {PAIRS.map(p=><option key={p} value={p}>{p.replace("-"," / ")}</option>)}
                </select>
              </div>
              <div style={{ flex:"1 1 180px" }}>
                <label style={{ fontSize:10, color:"#555", textTransform:"uppercase", letterSpacing:1, marginBottom:5, display:"block" }}>目标价格 (USDT)</label>
                <input type="number" value={price} onChange={e=>setPrice(e.target.value)}
                  placeholder={coinName==="BTC"?"例: 68000":coinName==="ETH"?"例: 3200":"输入价格"}
                  onKeyDown={e=>e.key==="Enter"&&!loading&&search()}
                  style={{
                    width:"100%", padding:"10px 12px", background:"#12121f",
                    border:"1px solid rgba(255,255,255,0.08)", borderRadius:8,
                    color:"#fff", fontSize:14, fontWeight:600, outline:"none",
                  }}
                />
              </div>
              <div style={{ flex:"0 0 auto" }}>
                <label style={{ fontSize:10, color:"#555", textTransform:"uppercase", letterSpacing:1, marginBottom:5, display:"block" }}>K线</label>
                <div style={{ display:"flex", gap:4 }}>
                  {BAR_OPTIONS.map(b=>(
                    <button key={b.value} onClick={()=>setBar(b.value)} style={{
                      padding:"10px 12px",
                      background: bar===b.value?"linear-gradient(135deg,#00e5ff,#007fff)":"#12121f",
                      color: bar===b.value?"#000":"#666",
                      border: bar===b.value?"none":"1px solid rgba(255,255,255,0.06)",
                      borderRadius:8, cursor:"pointer", fontSize:12, fontWeight: bar===b.value?800:400,
                    }}>{b.label}</button>
                  ))}
                </div>
              </div>
            </div>
            <button onClick={loading?cancel:search} disabled={!price&&!loading} style={{
              width:"100%", padding:"12px", border:"none", borderRadius:10,
              fontSize:14, fontWeight:800,
              cursor: price||loading?"pointer":"not-allowed",
              background: loading?"#ff3b3b":!price?"#222":"linear-gradient(90deg,#00e5ff,#007fff)",
              color: loading?"#fff":!price?"#555":"#000",
            }}>
              {loading?`⏹ 停止（已扫描 ${batchCount} 批）`:"🔍 查询"}
            </button>
          </div>

          {/* Progress */}
          {progress && <div style={{ textAlign:"center", padding:"10px 0", color:"#00e5ff", fontSize:13 }}><span className="pulse">⏳</span> {progress}</div>}
          {error && <div style={{ background:"rgba(255,59,59,0.06)", border:"1px solid rgba(255,59,59,0.15)", borderRadius:10, padding:"14px", marginBottom:20, color:"#ff6b6b", fontSize:13 }}>⚠️ {error}</div>}

          {/* Result Area */}
          {result && (
            <div>
              {/* Price Result Card */}
              <div style={{
                background:"rgba(0,229,255,0.03)", border:"1px solid rgba(0,229,255,0.12)",
                borderRadius:14, padding:"22px 20px", marginBottom:16,
              }}>
                <div style={{ fontSize:12, color:"#888", marginBottom:4 }}>
                  {pair.replace("-"," / ")} 最后一次触及
                  <span style={{ color:"#00e5ff", fontWeight:800, fontSize:14, marginLeft:6 }}>${Number(price).toLocaleString()}</span>
                </div>
                <div style={{ fontSize:28, fontWeight:800, color:"#fff", marginBottom:2 }}>{fmtDate(result.ts)}</div>
                <div style={{ fontSize:12, color:"#00e5ff", fontWeight:600, marginBottom:16 }}>{timeSince(result.ts)}（北京时间）</div>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:6 }}>
                  {[
                    { l:"开盘", v:result.open },
                    { l:"最高", v:result.high, c:"#4caf50" },
                    { l:"最低", v:result.low, c:"#ff5252" },
                    { l:"收盘", v:result.close },
                    { l:"成交量", v:result.vol, vol:true },
                  ].map(x=>(
                    <div key={x.l} style={{ background:"rgba(255,255,255,0.02)", borderRadius:8, padding:"8px 6px", textAlign:"center" }}>
                      <div style={{ fontSize:9, color:"#555", marginBottom:3 }}>{x.l}</div>
                      <div style={{ fontSize:12, fontWeight:700, color:x.c||"#ccc" }}>
                        {x.vol?Number(x.v).toLocaleString(undefined,{maximumFractionDigits:0}):"$"+Number(x.v).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:6})}
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Event Category Filter */}
              <div style={{
                display:"flex", flexWrap:"wrap", gap:6, marginBottom:14,
                padding:"12px 14px", background:"rgba(255,255,255,0.02)",
                border:"1px solid rgba(255,255,255,0.04)", borderRadius:10,
              }}>
                <span style={{ fontSize:11, color:"#555", lineHeight:"28px", marginRight:4 }}>事件筛选:</span>
                {Object.entries(CAT_CONFIG).map(([key, cfg]) => (
                  <button key={key} onClick={()=>toggleCat(key)} style={{
                    padding:"4px 10px", fontSize:11, fontWeight: enabledCats.has(key)?700:400,
                    background: enabledCats.has(key)?cfg.color+"22":"transparent",
                    color: enabledCats.has(key)?cfg.color:"#555",
                    border:`1px solid ${enabledCats.has(key)?cfg.color+"44":"rgba(255,255,255,0.06)"}`,
                    borderRadius:6, cursor:"pointer", transition:"all 0.15s",
                  }}>
                    {cfg.icon} {cfg.label}
                  </button>
                ))}
              </div>

              {/* Tabs */}
              <div style={{ display:"flex", gap:4, marginBottom:16 }}>
                {[
                  { key:"chart", label:"📈 K线图表", count: null },
                  { key:"timeline", label:"📅 事件轴", count: null },
                  { key:"news", label:"📰 新闻", count: news.length || null },
                ].map(t=>(
                  <button key={t.key} onClick={()=>setActiveTab(t.key)} style={{
                    flex:1, padding:"10px 0", textAlign:"center", fontSize:13, fontWeight: activeTab===t.key?700:400,
                    background: activeTab===t.key?"rgba(0,229,255,0.08)":"rgba(255,255,255,0.02)",
                    color: activeTab===t.key?"#00e5ff":"#666",
                    border: activeTab===t.key?"1px solid rgba(0,229,255,0.2)":"1px solid rgba(255,255,255,0.05)",
                    borderRadius:10, cursor:"pointer", transition:"all 0.15s",
                  }}>
                    {t.label}{t.count ? ` (${t.count})` : ""}
                  </button>
                ))}
              </div>

              {/* Tab Content */}
              <div style={{
                background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.05)",
                borderRadius:14, padding:"20px 18px", minHeight:300,
              }}>
                {/* ── CHART TAB ── */}
                {activeTab === "chart" && (
                  <div>
                    <h3 style={{ fontSize:15, fontWeight:700, color:"#fff", marginBottom:12 }}>
                      {pair.replace("-"," / ")} · {bar} K线 · 事件标注
                    </h3>
                    {chartCandles.length > 0 ? (
                      <PriceChart candles={chartCandles} hitTs={result.ts} hitPrice={price} pair={pair} events={MAJOR_EVENTS} enabledCats={enabledCats} />
                    ) : (
                      <div style={{ textAlign:"center", padding:"60px 0", color:"#555" }}>图表数据加载中...</div>
                    )}
                    <div style={{ marginTop:8, fontSize:10, color:"#444", textAlign:"right" }}>
                      图表上的圆圈标记 = 重大事件 · 箭头 = 触及目标价时间 · 虚线 = 目标价格线
                    </div>
                  </div>
                )}

                {/* ── TIMELINE TAB ── */}
                {activeTab === "timeline" && (
                  <EventTimeline events={MAJOR_EVENTS} hitTs={result.ts} enabledCats={enabledCats} />
                )}

                {/* ── NEWS TAB ── */}
                {activeTab === "news" && (
                  <div>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12, flexWrap:"wrap", gap:8 }}>
                      <h3 style={{ fontSize:15, fontWeight:700, color:"#fff", margin:0 }}>
                        当时的市场新闻
                      </h3>
                      <span style={{ fontSize:11, color:"#555" }}>
                        {news.length > 0 ? `共 ${news.length} 篇 · T1: ${t1Count}` : ""}
                      </span>
                    </div>
                    {news.length > 0 && (
                      <div style={{ display:"flex", gap:5, marginBottom:14 }}>
                        {[
                          { k:"all", l:`全部 (${news.length})` },
                          { k:"t1", l:`T1 权威 (${t1Count})` },
                          { k:"t12", l:`T1+T2` },
                        ].map(f=>(
                          <button key={f.k} onClick={()=>setNewsFilter(f.k)} style={{
                            padding:"5px 12px", fontSize:11, fontWeight: newsFilter===f.k?700:400,
                            background: newsFilter===f.k?"rgba(0,229,255,0.12)":"rgba(255,255,255,0.03)",
                            color: newsFilter===f.k?"#00e5ff":"#666",
                            border: newsFilter===f.k?"1px solid rgba(0,229,255,0.25)":"1px solid rgba(255,255,255,0.06)",
                            borderRadius:6, cursor:"pointer",
                          }}>{f.l}</button>
                        ))}
                      </div>
                    )}

                    {newsLoading && <div style={{ textAlign:"center", padding:"40px 0", color:"#00e5ff", fontSize:13 }}><span className="pulse">⏳</span> 正在拉取新闻...</div>}

                    {!newsLoading && filteredNews.length > 0 && (
                      <div style={{ maxHeight:500, overflowY:"auto" }}>
                        {filteredNews.map((a,i)=><NewsCard key={a.id} article={a} index={i} />)}
                      </div>
                    )}

                    {!newsLoading && news.length > 0 && filteredNews.length === 0 && (
                      <div style={{ textAlign:"center", padding:"30px 0", color:"#555", fontSize:12 }}>该筛选条件下无结果</div>
                    )}

                    {!newsLoading && news.length === 0 && (
                      <div style={{ textAlign:"center", padding:"30px 0", color:"#555", fontSize:12 }}>未找到该时段相关新闻</div>
                    )}

                    {newsDateRange && (
                      <a href={`https://www.google.com/search?q=${coinName}+crypto+news&tbs=cdr:1,cd_min:${newsDateRange.from},cd_max:${newsDateRange.to}`}
                        target="_blank" rel="noopener noreferrer"
                        style={{
                          display:"block", textAlign:"center", padding:"10px", marginTop:12,
                          background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.06)",
                          borderRadius:8, color:"#666", fontSize:12, fontWeight:600,
                        }}
                        onMouseOver={e=>{e.currentTarget.style.color="#00e5ff"}}
                        onMouseOut={e=>{e.currentTarget.style.color="#666"}}
                      >
                        🔍 在 Google 搜索更多 {coinName} 新闻
                      </a>
                    )}
                  </div>
                )}
              </div>
            </div>
          )}

          {/* Footer */}
          <div style={{ textAlign:"center", marginTop:32, paddingBottom:20, fontSize:10, color:"#2a2a40", lineHeight:1.8 }}>
            <div>OKX Price Time Machine v2.0</div>
            <div>价格: OKX API · 图表: TradingView Lightweight Charts · 新闻: CryptoCompare · 事件: 手动策展</div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
